# 4K ISP pipeline — full sensor utilization
camera:
  resolution: [3840, 2160]        # 4K display/ISP resolution
  sensor_resolution: [4056, 3040] # full IMX500 sensor
  framerate: 15                   # 4K sustainable framerate on Pi 5
  isp_only_framerate: 30          # framerate when no AI mode active

processing:
  sharpening:
    enabled: true
    strength: 1.0
  denoising:
    enabled: false
    mode: fast                    # fast = gaussian, quality = NLM
    strength: 1.0
  demosaicing_quality: false

detection:
  backend: auto
  confidence_threshold: 0.5
  inference_resolution: [1280, 720]  # resolution for ONNX inference downscale
  model_detection: "models/yolo11n.pt"
  model_segmentation: "models/yolo11n-seg.pt"

depth:
  model_path: models/midas_v21_small_256.onnx

server:
  enabled: true
  host: "0.0.0.0"
  port: 8765

app:
  display: false
  csv_log_path: ./logs/runtime_metrics.csv
  frame_queue_size: 2
  include_system_metrics: true
  headless: true
  mjpeg_resolution: [1920, 1080]  # stream resolution (4K->1080p for bandwidth)
  mjpeg_quality: 85
  display_window_name: "Pi Camera Platform"
